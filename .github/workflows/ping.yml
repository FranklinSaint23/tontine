name: Keep Render alive

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://tontine-backend-vj2a.onrender.com/health)
          echo "Backend responded: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "Backend is awake ✓"
          else
            echo "Warning: got HTTP $STATUS"
            exit 1
          fi
